[www]
; The number of requests each child process should execute before respawning.
; This is useful to work around memory leaks in 3rd party libraries.
pm.max_requests = 1000

; Process manager settings (Standard dynamic setup)
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10

; Ensure environment variables are accessible to PHP
clear_env = no

; Health check
ping.path = /ping
